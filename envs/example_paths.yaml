# Example configuration for etexana-genome-pipeline

project_id: etexana_zz
outdir: /path/to/output

inputs:
  hifi_reads: /path/to/ZZ_HiFi_reads.fastq.gz
  rnaseq_reads:
    - /path/to/RNAseq_rep1_R1.fastq.gz
    - /path/to/RNAseq_rep1_R2.fastq.gz
  ww_reference: /path/to/WW_reference_genome.fasta
  vgp_purged_contigs: /path/to/ZZ_purged_contigs_from_Galaxy.fasta

genomescope:
  kmer_size: 21
  ploidy: 2
  jellyfish_memory: 1G
  threads: 10

busco:
  lineage: arthropoda_odb10

repeatmasker:
  species: "eulimnadia texana"    # or "arthropoda"

blobtoolkit:
  prelim_blobdir: /path/to/preliminary/blobdir          # BlobDir for initial contigs
  prelim_assembly_fasta: /path/to/preliminary_contigs.fasta
  gc_min: 0.30
  gc_max: 0.45
  arthropoda_key: "Arthropoda"

minimap2:
  clean_contigs_fasta: /path/to/clean_contigs.fasta   # output from BlobToolKit step
  threads: 16
  preset: map-hifi     # good default for PacBio HiFi reads

busco:
  lineage: arthropoda_odb10

qc:
  assembly_fasta: /path/to/ZZ_final_assembly.fasta
  busco_mode: genome        # typical for assemblies
  threads: 16
  # Optional reference genome for QUAST (e.g. WW assembly); leave empty for none
  reference_for_quast: ""   # or /path/to/WW_reference_genome.fasta

vgp:
  galaxy_history_url: "https://usegalaxy.org/u/<user>/h/<history-id>"
  hifiasm_version: "0.16.1+galaxy4"
  vgp_pipeline_version: "VGP pipeline (Galaxy)"
  purged_contigs_fasta: /path/to/ZZ_purged_contigs_from_Galaxy.fasta

ww_reference:
  fasta: /path/to/WW_reference_genome.fasta

blobtoolkit_ww:
  blobdir: /path/to/WW_blobdir
  gc_min: 0.30
  gc_max: 0.45
  arthropoda_key: "Arthropoda"

gapcloser:
  ww_clean_fasta: /path/to/ww_reference_clean/clean_ww_assembly.fasta
  zz_clean_reads_fasta: /path/to/minimap2_clean_reads/ZZ_cleanreads.fastq  # or .fasta
  threads: 32
  tgstype: pb
  minmap_arg: "-x asm20"

ragtag:
  gapfilled_reference: /path/to/gapcloser/gap_filled_Etexana.scaffolds.fa
  zz_contigs_fasta: /path/to/ZZ_contigs.fasta
  threads: 32

